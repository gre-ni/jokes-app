openapi: 3.0.1
info:
  description: Example REST API for working with jokes
  title: Jokes
  version: 1.0.0-SNAPSHOT
servers:
- url: /
paths:
  /jokes:
    get:
      description: Obtains a list of `Joke`s. The list is sorted by `id`.
      operationId: getJokes
      parameters:
      - description: Filter jokes by category
        explode: true
        in: query
        name: category
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Joke'
                type: array
          description: Successful response
      summary: Obtains a list of jokes
      x-eov-operation-handler: controllers/DefaultController
    post:
      description: Creates a `Joke`.
      operationId: postJoke
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Joke'
        description: Joke
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                format: int64
                type: integer
          description: Successful response
      summary: Creates a joke
      x-codegen-request-body-name: joke
      x-eov-operation-handler: controllers/DefaultController
  /jokes/random:
    get:
      description: Obtains a random `Joke`.
      operationId: getRandomJoke
      parameters:
      - description: Filter by category
        explode: true
        in: query
        name: category
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Joke'
          description: Successful response
        "404":
          description: When no joke can be found
      summary: Obtains a random joke
      x-eov-operation-handler: controllers/DefaultController
  /jokes/{jokeId}:
    delete:
      description: Deletes a `Joke`.
      operationId: deleteJoke
      parameters:
      - description: Joke id
        explode: false
        in: path
        name: jokeId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "204":
          description: Successful response
      summary: Deletes a joke
      x-eov-operation-handler: controllers/DefaultController
    get:
      description: Obtains a `Joke` by its id.
      operationId: getJoke
      parameters:
      - description: Joke id
        explode: false
        in: path
        name: jokeId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Joke'
          description: Successful response
        "404":
          description: When the joke cannot be found
      summary: Obtains a joke
      x-eov-operation-handler: controllers/DefaultController
    put:
      description: Saves a `Joke`.
      operationId: putJoke
      parameters:
      - description: Joke id
        explode: false
        in: path
        name: jokeId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Joke'
        description: Joke
        required: true
      responses:
        "204":
          description: Successful response
      summary: Saves a joke
      x-codegen-request-body-name: joke
      x-eov-operation-handler: controllers/DefaultController
components:
  parameters:
    jokeId:
      description: Joke id
      explode: false
      in: path
      name: jokeId
      required: true
      schema:
        format: int64
        type: integer
      style: simple
  requestBodies:
    joke:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Joke'
      description: Joke
      required: true
  schemas:
    Category:
      enum:
      - GENERAL
      - PROGRAMMING
      - KNOCK_KNOCK
      - DAD
      type: string
    Joke:
      description: Joke
      example:
        id: 1
        setup: "Why do Java programmers wear glasses?"
        punchline: "Because they don't C#."
        category: PROGRAMMING
        rating: 5
      properties:
        id:
          description: Id
          format: int64
          type: integer
        setup:
          description: Setup (question) of the joke
          type: string
        punchline:
          description: Punchline of the joke
          type: string
        category:
          $ref: '#/components/schemas/Category'
        rating:
          description: Rating of the joke (1-5)
          format: int32
          maximum: 5
          minimum: 1
          type: integer
      required:
      - category
      - rating
      - setup
      - punchline
      type: object
